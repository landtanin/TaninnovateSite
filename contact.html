<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact &mdash; Taninnovate</title>
  <meta name="description" content="Get in touch with Tanin at Taninnovate. Whether you have a project in mind or just want to say hello.">
  <meta property="og:title" content="Contact &mdash; Taninnovate">
  <meta property="og:description" content="Get in touch with Tanin at Taninnovate.">
  <meta property="og:type" content="website">
  <link rel="icon" type="image/png" sizes="32x32" href="images/favicon.png">
  <link rel="apple-touch-icon" href="images/apple-touch-icon.png">
  <link href="https://fonts.googleapis.com/css?family=Ubuntu:300,400,300italic,400italic|Raleway:200,300" rel="stylesheet">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="page-wrapper">
    <header class="site-header">
      <nav class="container nav">
        <a href="index.html" class="nav-logo">
          <img src="images/taninnovate-logo-300.png" alt="Taninnovate" class="nav-logo-img">
        </a>
        <button class="nav-toggle" aria-label="Toggle menu" aria-expanded="false">
          <span class="nav-toggle-bar"></span>
          <span class="nav-toggle-bar"></span>
          <span class="nav-toggle-bar"></span>
        </button>
        <ul class="nav-links">
          <li><a href="index.html">Home</a></li>
          <li><a href="about.html">About</a></li>
          <li><a href="work.html">Projects</a></li>
          <li><a href="contact.html" aria-current="page" class="btn btn-primary btn-sm">Contact</a></li>
        </ul>
      </nav>
    </header>

    <main>
      <section class="page-header">
        <div class="container">
          <h1>Get in touch</h1>
          <p>Whether you have a project in mind, want to discuss a product, or just want to say hello.</p>
        </div>
      </section>

      <section class="section">
        <div class="container contact-layout">
          <div class="contact-info">
            <h2>Connect</h2>
            <ul class="social-links">
              <li><a href="https://www.linkedin.com/in/tanin-rojanapiansatith/" target="_blank" rel="noopener">LinkedIn</a></li>
            </ul>
          </div>

          <form class="contact-form" action="https://formspree.io/f/xkoqnlyj" method="POST">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" required>

            <label for="email">Email</label>
            <input type="email" id="email" name="email" required>

            <label for="message">Message</label>
            <textarea id="message" name="message" rows="5" required></textarea>

            <button type="submit" class="btn btn-primary">Send message</button>
          </form>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container footer-inner">
        <p>&copy; 2026 Taninnovate.</p>
        <ul class="footer-links">
          <li><a href="https://www.linkedin.com/in/tanin-rojanapiansatith/" target="_blank" rel="noopener">LinkedIn</a></li>
        </ul>
      </div>
    </footer>
  </div>

  <script src="js/main.js"></script>
</body>
</html>
